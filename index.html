<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roack Paper Scisor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Welcome to Rock Paper Scissor Game</h1>

    <div class="container">
        
        <div class="game">
            <div class="boxes" id="rock">
                <img src="rock.png">
            </div>
            <div class="boxes" id="paper">
                <img src="paper.png">
            </div>
            <div class="boxes" id="scissor">
                <img src="scissors.png">
            </div>
        </div>
        <div class="count">
            <div class="user">
                <p id="userscr">0</p>
                <h2>User Score</h2>
            </div>
            <div class="computer">
                <p id="compscr">0</p>
                <h2>Computer Score</h2>
            </div>
        </div>
        <div id="message">Let's Play</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
